<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Seminarios — Congreso 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  :root {
    --navy: #1a2744;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f3ec;
    --red: #c0392b;
    --green: #1e7d4f;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,39,68,0.13);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { font-size: 16px; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--navy);
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: var(--white);
    padding: 28px 20px 22px;
    text-align: center;
    border-bottom: 4px solid var(--gold);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5vw, 2rem);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  header p { font-size: 0.88rem; color: var(--gold-light); font-weight: 300; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    position: sticky; top: 0; z-index: 50;
  }
  .tab-btn {
    flex: 1; padding: 14px 6px;
    background: none; border: none;
    color: #8899bb;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.82rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 3px solid transparent; margin-bottom: -3px;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,168,76,0.08); }

  /* ── VIEWS ── */
  .view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .view.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--navy);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--gold);
  }

  /* ── CAMPO NOMBRE ── */
  .field { margin-bottom: 4px; }
  .field label {
    display: block; font-size: 0.8rem; font-weight: 700;
    color: var(--navy); margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field input {
    width: 100%; padding: 13px 15px;
    border: 2px solid #dde3f0; border-radius: 10px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem; color: var(--navy);
    transition: border-color 0.2s;
    /* evita zoom en iOS */
    font-size: max(1rem, 16px);
  }
  .field input:focus { outline: none; border-color: var(--gold); }

  /* ── BLOQUE DE SEMINARIO ── */
  .sem-group { margin-bottom: 20px; }

  .sem-group-header {
    background: var(--navy);
    border-radius: 10px 10px 0 0;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .sem-group-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }
  .sem-group-hora {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .sem-group-body {
    border: 2px solid #dde3f0;
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  /* Aviso "ya elegiste uno" */
  .sem-notice {
    display: none;
    padding: 9px 14px;
    background: #fff8e6;
    border-bottom: 1px solid #f0d98a;
    font-size: 0.82rem;
    font-weight: 600;
    color: #8a6000;
    align-items: center;
    gap: 6px;
  }
  .sem-notice.show { display: flex; }

  /* ── RADIO CARD ── */
  .slot-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid #eef0f6;
    background: var(--white);
    /* área táctil generosa */
    min-height: 64px;
  }
  .slot-card:last-child { border-bottom: none; }
  .slot-card:active:not(.lleno) { background: #fffbf0; }
  .slot-card.selected { background: #fffbf0; }
  .slot-card.lleno { opacity: 0.5; cursor: not-allowed; background: #f9f9f9; }

  /* Radio visual */
  .slot-radio {
    width: 22px; height: 22px; min-width: 22px;
    border: 2.5px solid #c8d0e0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .slot-card.selected .slot-radio {
    border-color: var(--gold);
    background: var(--gold);
  }
  .slot-card.selected .slot-radio::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: white;
  }
  .slot-card.lleno .slot-radio { border-color: #ccc; background: #eee; }

  /* Info del slot */
  .slot-info { flex: 1; min-width: 0; }
  .slot-name {
    font-weight: 700;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .slot-bar-row { display: flex; align-items: center; gap: 8px; }
  .slot-bar { flex: 1; height: 6px; background: #e5e9f0; border-radius: 10px; overflow: hidden; }
  .slot-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
  .fill-ok   { background: var(--green); }
  .fill-warn { background: #e67e22; }
  .fill-full { background: var(--red); }
  .slot-lbl  { font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
  .lbl-ok   { color: var(--green); }
  .lbl-warn { color: #e67e22; }
  .lbl-full { color: var(--red); }

  /* Instrucción debajo del bloque */
  .sem-hint {
    font-size: 0.78rem;
    color: #99a;
    margin-top: 6px;
    padding: 0 4px;
    font-style: italic;
  }

  /* ── BOTÓN REGISTRAR ── */
  .submit-btn {
    width: 100%; padding: 16px;
    background: var(--navy); color: var(--white);
    border: none; border-radius: 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer; transition: background 0.2s;
    margin-top: 4px;
  }
  .submit-btn:hover:not(:disabled) { background: #243460; }
  .submit-btn:disabled { background: #a0a8b8; cursor: not-allowed; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 17px; height: 17px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 7px;
  }
  .spinner-dark {
    border-color: rgba(26,39,68,0.2);
    border-top-color: var(--navy);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ALERTS ── */
  .alert { padding: 12px 15px; border-radius: 9px; margin-bottom: 13px; font-size: 0.9rem; font-weight: 600; }
  .alert-error   { background: #fdecea; color: var(--red);   border: 1px solid #f5c6c2; }
  .alert-success { background: #e8f5ee; color: var(--green); border: 1px solid #b7dfc8; }
  .alert-info    { background: #eef2ff; color: var(--navy);  border: 1px solid #c5d0f0; }

  /* ── ÉXITO ── */
  .success-card { text-align: center; }
  .success-icon { font-size: 3.2rem; margin-bottom: 10px; }
  .success-card h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 6px; }
  .success-card > p { color: #667; font-size: 0.9rem; margin-bottom: 16px; }
  .ticket { background: var(--cream); border: 2px dashed var(--gold); border-radius: 12px; padding: 16px; text-align: left; }
  .ticket-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #e0d8c8; font-size: 0.9rem; }
  .ticket-item:last-child { border-bottom: none; }
  .ticket-dot { color: var(--gold); font-weight: 700; margin-top: 1px; font-size: 1rem; }
  .ticket-sem  { font-weight: 700; font-size: 1rem; color: var(--navy); }
  .ticket-hora { font-size: 0.83rem; color: var(--gold); font-weight: 600; }
  .ticket-sp   { font-size: 0.85rem; color: #667; margin-top: 2px; }
  .new-btn {
    width: 100%; padding: 15px; margin-top: 14px;
    background: var(--gold); color: var(--navy);
    border: none; border-radius: 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .new-btn:hover { background: var(--gold-light); }

  /* ── CUPOS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--white); border-radius: 12px; padding: 14px 8px; text-align: center; box-shadow: var(--shadow); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--navy); }
  .stat-lbl { font-size: 0.7rem; color: #889; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 3px; }

  .cupos-group { background: var(--white); border-radius: 12px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .cupos-group-header { background: var(--navy); padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; }
  .cupos-group-title  { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--white); }
  .cupos-group-hora   { font-size: 0.9rem; font-weight: 700; color: var(--gold); }
  .cupos-body { padding: 12px 16px; }
  .cupo-row { margin-bottom: 12px; }
  .cupo-row:last-child { margin-bottom: 0; }
  .cupo-row-top { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 5px; }
  .cupo-row-name { font-weight: 700; }

  .refresh-btn {
    width: 100%; padding: 12px; margin-bottom: 14px;
    background: var(--white); border: 2px solid var(--gold);
    border-radius: 12px; color: var(--navy);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700; font-size: 0.9rem; cursor: pointer;
  }

  /* ── ADMIN ── */
  .admin-login { text-align: center; }
  .admin-login .icon { font-size: 2.8rem; margin-bottom: 10px; }
  .admin-login h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 16px; }
  .admin-login input { width: 100%; padding: 13px 15px; border: 2px solid #dde3f0; border-radius: 10px; font-size: max(1rem, 16px); margin-bottom: 12px; }
  .admin-login input:focus { outline: none; border-color: var(--gold); }
  .login-btn { width: 100%; padding: 14px; background: var(--navy); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }

  .export-btn { width: 100%; padding: 14px; margin-bottom: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 12px; font-family: 'Source Sans 3', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  .export-btn:hover { background: var(--gold-light); }

  .seg-section { margin-bottom: 20px; }
  .seg-header { background: var(--navy); color: white; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .seg-header-title { font-family: 'Playfair Display', serif; font-size: 1rem; }
  .seg-header-hora  { font-size: 0.85rem; color: var(--gold); font-weight: 700; }
  .seg-header-count { font-size: 0.8rem; color: var(--gold-light); }
  .seg-speaker { margin-bottom: 8px; background: var(--white); border-radius: 10px; padding: 13px; box-shadow: var(--shadow); }
  .seg-speaker-title { font-size: 0.82rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1px solid rgba(201,168,76,0.2); display: flex; justify-content: space-between; }
  .reg-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.88rem; gap: 8px; }
  .reg-item:last-child { border-bottom: none; }
  .reg-name-text { font-weight: 700; color: var(--navy); }
  .reg-date { font-size: 0.74rem; color: #aaa; margin-top: 1px; }
  .del-btn { padding: 5px 10px; background: none; border: 1px solid #f5c6c2; border-radius: 6px; color: var(--red); font-size: 0.75rem; cursor: pointer; white-space: nowrap; min-height: 34px; }
  .del-btn:hover { background: #fdecea; }

  .logout-btn { width: 100%; padding: 12px; margin-top: 12px; background: none; border: 2px solid #dde3f0; border-radius: 10px; color: #889; font-size: 0.88rem; cursor: pointer; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.88rem; font-weight: 700; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; }

  /* ── LOADING ── */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,39,68,0.4); z-index: 100; align-items: center; justify-content: center; }
  .loading-overlay.show { display: flex; }
  .loading-box { background: white; border-radius: 14px; padding: 26px 36px; text-align: center; }
  .big-spin { display: block; width: 32px; height: 32px; border: 3px solid #dde3f0; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  .loading-box p { font-size: 0.9rem; color: var(--navy); font-weight: 700; }

  /* ── RESPONSIVE desktop ── */
  @media (min-width: 480px) {
    .view { padding: 20px; }
    .slot-name { font-size: 1.05rem; }
    .sem-group-title { font-size: 1.25rem; }
    .sem-group-hora  { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Registro de Seminarios</h1>
  <p>Elige un orador por cada bloque</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('registro',this)">✍️ Registro</button>
  <button class="tab-btn" onclick="showTab('cupos',this)">📊 Cupos</button>
  <button class="tab-btn" onclick="showTab('admin',this)">🔒 Admin</button>
</div>

<!-- ══ REGISTRO ══════════════════════════════════════════ -->
<div id="tab-registro" class="view active">

  <div id="form-view">
    <div class="card">
      <h2>Tus datos</h2>
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" autocomplete="off" autocorrect="off"/>
      </div>
    </div>

    <div class="card">
      <h2>Elige tu seminario</h2>
      <p style="font-size:0.85rem;color:#889;margin-bottom:18px;line-height:1.5;">
        Por cada bloque, selecciona <strong>un orador</strong>. Máximo 40 personas por grupo.
      </p>
      <div id="slots-list">
        <div class="alert alert-info">
          <span class="spinner spinner-dark"></span> Cargando disponibilidad…
        </div>
      </div>
    </div>

    <div id="form-alert"></div>
    <button class="submit-btn" id="submit-btn" onclick="registrar()">Confirmar Registro</button>
  </div>

  <div id="success-view" style="display:none;">
    <div class="card success-card">
      <div class="success-icon">✅</div>
      <h2>¡Registro exitoso!</h2>
      <p id="success-name"></p>
      <div class="ticket" id="success-ticket"></div>
    </div>
    <button class="new-btn" onclick="nuevoRegistro()">+ Registrar otra persona</button>
  </div>

</div>

<!-- ══ CUPOS ═════════════════════════════════════════════ -->
<div id="tab-cupos" class="view">
  <button class="refresh-btn" onclick="loadCupos(true)">↻ Actualizar disponibilidad</button>
  <div id="cupos-content">
    <div class="alert alert-info"><span class="spinner spinner-dark"></span> Cargando…</div>
  </div>
</div>

<!-- ══ ADMIN ══════════════════════════════════════════════ -->
<div id="tab-admin" class="view">
  <div id="admin-login-view">
    <div class="card admin-login">
      <div class="icon">🔒</div>
      <h2>Acceso Administrativo</h2>
      <input type="password" id="admin-pass" placeholder="Contraseña"
             onkeydown="if(event.key==='Enter')adminLogin()"/>
      <button class="login-btn" onclick="adminLogin()">Ingresar</button>
      <div id="login-alert" style="margin-top:12px;"></div>
    </div>
  </div>
  <div id="admin-panel" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading">
  <div class="loading-box"><span class="big-spin"></span><p>Guardando registro…</p></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
// ⚠️  CAMBIA ESTA URL después de desplegar el Apps Script
// ════════════════════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbz-nf5cewpAwoQBXwWpXU8VT08l2J-m-MlE6sCSItVQ-70u70xpjMaTb4j3WIlK41at/exec';

const SEMINARIOS = [
  { id: 'S1', num: 'Seminario 1', hora: '9:30 a.m.' },
  { id: 'S2', num: 'Seminario 2', hora: '4:05 p.m.' },
  { id: 'S3', num: 'Seminario 3', hora: '9:00 a.m.' },
  { id: 'S4', num: 'Seminario 4', hora: '11:25 a.m.' },
];
const SPEAKERS = ['Scott Mayer', 'Sebastien Braxton', 'Manuel Montero'];
const CAPACIDAD = 40;

function slotId(semId, sp) { return `${semId}_${sp.replace(/\s/g,'')}`; }

const SLOT_META = {};
SEMINARIOS.forEach(s => SPEAKERS.forEach(sp => {
  SLOT_META[slotId(s.id, sp)] = { semNum: s.num, hora: s.hora, speaker: sp, semId: s.id };
}));

// selectedSlots ahora es un map: semId → slotId (radio: 1 por bloque)
let selectedSlots = {};   // { S1: 'S1_ScottMayer', S2: null, ... }
let cuposCache = null;
let adminPass = '';

async function api(params) {
  const res = await fetch(`${API}?${new URLSearchParams(params)}`);
  return res.json();
}

// ── CUPOS ─────────────────────────────────────────────────
async function loadCupos(force = false) {
  if (!force && cuposCache) { renderCuposTab(cuposCache); return cuposCache; }
  document.getElementById('cupos-content').innerHTML =
    '<div class="alert alert-info"><span class="spinner spinner-dark"></span> Actualizando…</div>';
  try {
    const data = await api({ action: 'getCupos' });
    if (data.ok) { cuposCache = data.cupos; renderCuposTab(data.cupos); return data.cupos; }
  } catch(e) {}
  document.getElementById('cupos-content').innerHTML =
    '<div class="alert alert-error">Error al cargar. Intenta de nuevo.</div>';
  return cuposCache || {};
}

function renderCuposTab(cupos) {
  let llenos = 0, totalIns = 0;
  Object.values(cupos).forEach(v => { totalIns += (CAPACIDAD - v); if (v === 0) llenos++; });
  const totalSlots = SEMINARIOS.length * SPEAKERS.length;

  let html = `<div class="stats-grid">
    <div class="stat-box"><div class="stat-num">${llenos}</div><div class="stat-lbl">Llenos</div></div>
    <div class="stat-box"><div class="stat-num">${totalSlots - llenos}</div><div class="stat-lbl">Con cupos</div></div>
    <div class="stat-box"><div class="stat-num">${totalIns}</div><div class="stat-lbl">Inscripciones</div></div>
  </div>`;

  SEMINARIOS.forEach(s => {
    html += `<div class="cupos-group">
      <div class="cupos-group-header">
        <span class="cupos-group-title">${s.num}</span>
        <span class="cupos-group-hora">${s.hora}</span>
      </div>
      <div class="cupos-body">`;
    SPEAKERS.forEach(sp => {
      const id = slotId(s.id, sp);
      const libres = cupos[id] ?? CAPACIDAD;
      const ocu = CAPACIDAD - libres;
      const pct = Math.min(100, ocu / CAPACIDAD * 100);
      const lleno = libres === 0, warn = libres <= 8 && !lleno;
      html += `<div class="cupo-row">
        <div class="cupo-row-top">
          <span class="cupo-row-name">${sp}</span>
          <span class="slot-lbl ${lleno?'lbl-full':warn?'lbl-warn':'lbl-ok'}">${lleno?'🔴 Lleno':`${libres} disponibles`}</span>
        </div>
        <div class="slot-bar"><div class="slot-bar-fill ${lleno?'fill-full':warn?'fill-warn':'fill-ok'}" style="width:${pct}%"></div></div>
      </div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('cupos-content').innerHTML = html;
}

// ── RENDER SLOTS (radio buttons) ──────────────────────────
async function renderSlots() {
  const cupos = await loadCupos();
  let html = '';

  SEMINARIOS.forEach(s => {
    const selId = selectedSlots[s.id] || null;

    html += `<div class="sem-group">
      <div class="sem-group-header">
        <span class="sem-group-title">${s.num}</span>
        <span class="sem-group-hora">${s.hora}</span>
      </div>
      <div class="sem-group-body">
        <div class="sem-notice ${selId ? 'show' : ''}" id="notice_${s.id}">
          ⚠️ Solo puedes elegir un orador por bloque. Deselecciona el actual para cambiar.
        </div>`;

    SPEAKERS.forEach(sp => {
      const id = slotId(s.id, sp);
      const libres = cupos[id] ?? CAPACIDAD;
      const ocu = CAPACIDAD - libres;
      const lleno = libres === 0, warn = libres <= 8 && !lleno;
      const sel = selId === id;
      const pct = Math.min(100, ocu / CAPACIDAD * 100);

      html += `<div class="slot-card ${sel?'selected':''} ${lleno?'lleno':''}"
                    onclick="toggleRadio('${s.id}','${id}',${lleno})">
        <div class="slot-radio"></div>
        <div class="slot-info">
          <div class="slot-name">${sp}</div>
          <div class="slot-bar-row">
            <div class="slot-bar">
              <div class="slot-bar-fill ${lleno?'fill-full':warn?'fill-warn':'fill-ok'}" style="width:${pct}%"></div>
            </div>
            <span class="slot-lbl ${lleno?'lbl-full':warn?'lbl-warn':'lbl-ok'}">${lleno?'Lleno':`${libres} libres`}</span>
          </div>
        </div>
      </div>`;
    });

    html += `</div>
      <p class="sem-hint">Elige solo un orador para este bloque.</p>
    </div>`;
  });

  document.getElementById('slots-list').innerHTML = html;
}

function toggleRadio(semId, id, lleno) {
  if (lleno) { showToast('Este grupo ya no tiene cupos disponibles'); return; }

  const yaElegido = selectedSlots[semId];

  if (yaElegido === id) {
    // Deseleccionar
    delete selectedSlots[semId];
  } else if (yaElegido && yaElegido !== id) {
    // Intentó elegir otro → mostrar aviso brevemente, no cambiar
    const notice = document.getElementById(`notice_${semId}`);
    if (notice) {
      notice.classList.add('show');
      // Vibración táctil (si soportada)
      if (navigator.vibrate) navigator.vibrate(60);
    }
    return;
  } else {
    selectedSlots[semId] = id;
  }

  renderSlots();
}

// ── REGISTRAR ─────────────────────────────────────────────
async function registrar() {
  const nombre = document.getElementById('nombre').value.trim();
  const alertEl = document.getElementById('form-alert');
  alertEl.innerHTML = '';

  if (!nombre) {
    alertEl.innerHTML = '<div class="alert alert-error">Por favor ingresa tu nombre completo.</div>';
    return;
  }

  const slots = Object.values(selectedSlots).filter(Boolean);
  if (!slots.length) {
    alertEl.innerHTML = '<div class="alert alert-error">Selecciona al menos un seminario.</div>';
    return;
  }

  document.getElementById('loading').classList.add('show');
  document.getElementById('submit-btn').disabled = true;

  try {
    const data = await api({ action: 'register', nombre, slots: JSON.stringify(slots) });
    document.getElementById('loading').classList.remove('show');
    if (data.ok) {
      cuposCache = null;
      mostrarExito(nombre);
    } else {
      alertEl.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
      document.getElementById('submit-btn').disabled = false;
      if ((data.error || '').includes('lleno')) { cuposCache = null; renderSlots(); }
    }
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    alertEl.innerHTML = '<div class="alert alert-error">Error de conexión. Intenta de nuevo.</div>';
    document.getElementById('submit-btn').disabled = false;
  }
}

function mostrarExito(nombre) {
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('success-view').style.display = 'block';
  document.getElementById('success-name').textContent = `¡Listo, ${nombre}!`;

  const slots = Object.values(selectedSlots).filter(Boolean);
  document.getElementById('success-ticket').innerHTML = slots.map(id => {
    const m = SLOT_META[id];
    return m ? `<div class="ticket-item">
      <span class="ticket-dot">◆</span>
      <div>
        <div class="ticket-sem">${m.semNum}</div>
        <div class="ticket-hora">${m.hora}</div>
        <div class="ticket-sp">${m.speaker}</div>
      </div>
    </div>` : '';
  }).join('');
}

function nuevoRegistro() {
  selectedSlots = {};
  document.getElementById('nombre').value = '';
  document.getElementById('form-alert').innerHTML = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('success-view').style.display = 'none';
  renderSlots();
}

// ── ADMIN ──────────────────────────────────────────────────
async function adminLogin() {
  const pass = document.getElementById('admin-pass').value;
  document.getElementById('login-alert').innerHTML =
    '<div class="alert alert-info"><span class="spinner spinner-dark"></span> Verificando…</div>';
  try {
    const data = await api({ action: 'getList', pass });
    if (data.ok) {
      adminPass = pass;
      document.getElementById('admin-login-view').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      renderAdmin(data.registros);
    } else {
      document.getElementById('login-alert').innerHTML =
        `<div class="alert alert-error">${data.error}</div>`;
    }
  } catch(e) {
    document.getElementById('login-alert').innerHTML =
      '<div class="alert alert-error">Error de conexión.</div>';
  }
}

function renderAdmin(registros) {
  const seg = {};
  SEMINARIOS.forEach(s => {
    seg[s.id] = { meta: s, speakers: {} };
    SPEAKERS.forEach(sp => seg[s.id].speakers[sp] = []);
  });
  registros.forEach(r => r.slots.forEach(id => {
    const m = SLOT_META[id];
    if (m) seg[m.semId].speakers[m.speaker].push(r);
  }));

  let html = `<button class="export-btn" onclick="exportExcel()">⬇ Descargar lista en Excel (.xlsx)</button>`;

  SEMINARIOS.forEach(s => {
    let total = SPEAKERS.reduce((a, sp) => a + seg[s.id].speakers[sp].length, 0);
    html += `<div class="seg-section">
      <div class="seg-header">
        <div>
          <div class="seg-header-title">${s.num}</div>
          <div class="seg-header-hora">${s.hora}</div>
        </div>
        <span class="seg-header-count">${total} inscritos</span>
      </div>`;

    SPEAKERS.forEach(sp => {
      const lista = seg[s.id].speakers[sp];
      html += `<div class="seg-speaker">
        <div class="seg-speaker-title">
          <span>${sp}</span>
          <span style="font-weight:400;color:#889;">${lista.length}/${CAPACIDAD}</span>
        </div>`;
      if (!lista.length) {
        html += '<p style="color:#bbb;font-size:0.83rem;padding:4px 0;">Sin inscritos aún.</p>';
      } else {
        lista.forEach((r, i) => {
          html += `<div class="reg-item">
            <div>
              <div class="reg-name-text">${i+1}. ${r.nombre}</div>
              <div class="reg-date">${r.fecha}</div>
            </div>
            <button class="del-btn" onclick="eliminarAdmin(${r.id})">✕ Eliminar</button>
          </div>`;
        });
      }
      html += '</div>';
    });
    html += '</div>';
  });

  html += `<button class="logout-btn" onclick="adminLogout()">Cerrar sesión</button>`;
  document.getElementById('admin-panel').innerHTML = html;
}

async function eliminarAdmin(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  try {
    const data = await api({ action: 'delete', pass: adminPass, id });
    if (data.ok) {
      showToast('Registro eliminado'); cuposCache = null;
      const list = await api({ action: 'getList', pass: adminPass });
      if (list.ok) renderAdmin(list.registros);
    } else showToast('Error: ' + data.error);
  } catch(e) { showToast('Error de conexión'); }
}

function adminLogout() {
  adminPass = '';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('admin-login-view').style.display = 'block';
  document.getElementById('admin-pass').value = '';
  document.getElementById('login-alert').innerHTML = '';
}

// ── EXPORTAR EXCEL ────────────────────────────────────────
async function exportExcel() {
  const data = await api({ action: 'getList', pass: adminPass });
  if (!data.ok) { showToast('Error al obtener datos'); return; }

  const wb = XLSX.utils.book_new();
  const hdrFill  = { patternType:'solid', fgColor:{rgb:'1A2744'} };
  const hdrFont  = { bold:true, color:{rgb:'FFFFFF'}, name:'Arial', sz:11 };
  const semFill  = { patternType:'solid', fgColor:{rgb:'C9A84C'} };
  const semFont  = { bold:true, color:{rgb:'FFFFFF'}, name:'Arial', sz:11 };
  const altFill  = { patternType:'solid', fgColor:{rgb:'F7F3EC'} };
  const boldFont = { bold:true, name:'Arial', sz:10 };
  const normFont = { name:'Arial', sz:10 };
  const center   = { horizontal:'center', vertical:'center' };
  const border   = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };

  // Hoja 1: Lista completa
  const rows = [
    [{ v:'LISTA DE INSCRITOS — CONGRESO 2026', s:{ font:{bold:true,sz:14,name:'Arial',color:{rgb:'1A2744'}}, alignment:center } }],
    [],
    [
      { v:'Seminario',     s:{ font:hdrFont, fill:hdrFill, alignment:center, border } },
      { v:'Hora',          s:{ font:hdrFont, fill:hdrFill, alignment:center, border } },
      { v:'Orador',        s:{ font:hdrFont, fill:hdrFill, border } },
      { v:'#',             s:{ font:hdrFont, fill:hdrFill, alignment:center, border } },
      { v:'Nombre',        s:{ font:hdrFont, fill:hdrFill, border } },
      { v:'Fecha Registro',s:{ font:hdrFont, fill:hdrFill, border } },
    ]
  ];

  SEMINARIOS.forEach(s => {
    let firstSem = true;
    SPEAKERS.forEach(sp => {
      const id = slotId(s.id, sp);
      const lista = data.registros.filter(r => r.slots.includes(id));
      if (!lista.length) {
        rows.push([
          { v: firstSem ? s.num  : '', s:{ font:boldFont, fill:semFill, border, alignment:center } },
          { v: firstSem ? s.hora : '', s:{ font:boldFont, fill:semFill, border, alignment:center } },
          { v: sp, s:{ font:boldFont, border } },
          { v:'—', s:{ font:normFont, border, alignment:center } },
          { v:'Sin inscritos', s:{ font:{italic:true,color:{rgb:'AAAAAA'},name:'Arial',sz:10}, border } },
          { v:'', s:{ border } },
        ]);
        firstSem = false;
      } else {
        lista.forEach((r, i) => {
          const f = i%2!==0 ? {fill:altFill} : {};
          rows.push([
            { v: firstSem&&i===0 ? s.num  : '', s:{ font:boldFont, fill:semFill, border, alignment:center } },
            { v: firstSem&&i===0 ? s.hora : '', s:{ font:boldFont, fill:semFill, border, alignment:center } },
            { v: i===0 ? sp : '', s:{ font:boldFont, border } },
            { v: i+1,     s:{ font:normFont, border, alignment:center, ...f } },
            { v: r.nombre,s:{ font:normFont, border, ...f } },
            { v: r.fecha, s:{ font:normFont, border, ...f } },
          ]);
        });
        firstSem = false;
      }
    });
  });

  const ws1 = XLSX.utils.aoa_to_sheet(rows);
  ws1['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:5} }];
  ws1['!cols'] = [{wch:14},{wch:12},{wch:24},{wch:5},{wch:32},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Lista Completa');

  // Hoja por seminario
  SEMINARIOS.forEach(s => {
    const sRows = [
      [{ v:`${s.num.toUpperCase()} · ${s.hora}`, s:{ font:{bold:true,sz:13,name:'Arial',color:{rgb:'1A2744'}}, alignment:center } }],
      [],
    ];
    SPEAKERS.forEach(sp => {
      const id = slotId(s.id, sp);
      const lista = data.registros.filter(r => r.slots.includes(id));
      sRows.push(
        [{ v:sp, s:{font:semFont,fill:semFill,border} }, { v:`${lista.length}/40 inscritos`, s:{font:semFont,fill:semFill,border,alignment:center} }, {v:'',s:{fill:semFill}}],
        [{ v:'#', s:{font:hdrFont,fill:hdrFill,border,alignment:center} }, { v:'Nombre', s:{font:hdrFont,fill:hdrFill,border} }, { v:'Fecha', s:{font:hdrFont,fill:hdrFill,border} }]
      );
      if (!lista.length) {
        sRows.push([{v:'—',s:{font:normFont,border,alignment:center}},{v:'Sin inscritos aún',s:{font:{italic:true,color:{rgb:'AAAAAA'},name:'Arial',sz:10},border}},{v:'',s:{border}}]);
      } else {
        lista.forEach((r,i) => {
          const f = i%2!==0?{fill:altFill}:{};
          sRows.push([{v:i+1,s:{font:normFont,border,alignment:center,...f}},{v:r.nombre,s:{font:normFont,border,...f}},{v:r.fecha,s:{font:normFont,border,...f}}]);
        });
      }
      sRows.push([]);
    });
    const ws = XLSX.utils.aoa_to_sheet(sRows);
    ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:2} }];
    ws['!cols'] = [{wch:5},{wch:32},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws, s.num);
  });

  XLSX.writeFile(wb, 'inscritos_congreso2026.xlsx');
  showToast('Descargando Excel…');
}

// ── TABS ──────────────────────────────────────────────────
function showTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'cupos') loadCupos(true);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────
renderSlots();
</script>
